      "$type":
        "markdown_description": |-
          The registered model resource allows you to define models in Unity Catalog. For information about Unity Catalog [registered models](/api/workspace/registeredmodels/create), see [_](/machine-learning/manage-model-lifecycle/index.md).
        "markdown_examples": |-
          The following example defines a registered model in Unity Catalog:

          ```yaml
          resources:
            registered_models:
                model:
                  name: my_model
                  catalog_name: ${bundle.target}
                  schema_name: mlops_schema
                  comment: Registered model in Unity Catalog for ${bundle.target} deployment target
                  grants:
                    - privileges:
                        - EXECUTE
                      principal: account users
          ```
      "$fields":
        "grants":
          "description": |-
            The Unity Catalog privileges to grant to principals on this securable.
          "markdown_description": |-
            A Sequence of Unity Catalog privilege grants on this securable, where each item grants a set of `privileges` to a `principal` (a user, group, or service principal).

            See [\_](/data-governance/unity-catalog/manage-privileges/index.md).
          "markdown_examples": |-
            ```yaml
            grants:
              - principal: account users
                privileges:
                  - SELECT
              - principal: data-engineers
                privileges:
                  - ALL_PRIVILEGES
            ```
        "lifecycle":
          "description": |-
            Settings that control the deployment lifecycle of the resource, such as preventing it from being destroyed.
    "schemas":
      "description": |-
        The schema definitions for the bundle, where each key is the name of the schema.
      "markdown_description": |-
        The schema definitions for the bundle, where each key is the name of the schema. See [\_](/dev-tools/bundles/resources.md#schemas).
      "$type":
        "markdown_description": |-
          The schema resource type allows you to define Unity Catalog [schemas](/api/workspace/schemas/create) for tables and other assets in your jobs and pipelines created as part of a bundle. A schema, different from other resource types, has the following limitations:

          - The owner of a schema resource is always the deployment user, and cannot be changed. If `run_as` is specified in the bundle, it will be ignored by operations on the schema.
          - Only fields supported by the corresponding [Schemas object create API](/api/workspace/schemas/create) are available for the schema resource. For example, `enable_predictive_optimization` is not supported as it is only available on the [update API](/api/workspace/schemas/update).
        "markdown_examples": |-
          The following example defines a pipeline with the resource key `my_pipeline` that creates a Unity Catalog schema with the key `my_schema` as the target:

          ```yaml
          resources:
            pipelines:
              my_pipeline:
                name: test-pipeline-{{.unique_id}}
                libraries:
                  - notebook:
                      path: ./nb.sql
                development: true
                catalog: main
                target: ${resources.schemas.my_schema.id}

            schemas:
              my_schema:
                name: test-schema-{{.unique_id}}
                catalog_name: main
                comment: This schema was created by DABs.
          ```

          A top-level grants mapping is not supported by Declarative Automation Bundles, so if you want to set grants for a schema, define the grants for the schema within the `schemas` mapping. For more information about grants, see [_](/data-governance/unity-catalog/manage-privileges/index.md#grant).

          The following example defines a Unity Catalog schema with grants:

          ```yaml
          resources:
            schemas:
              my_schema:
                name: test-schema
                grants:
                  - principal: users
                    privileges:
                      - CAN_MANAGE
                  - principal: my_team
                    privileges:
                      - CAN_READ
                catalog_name: main
            ```
      "$fields":
        "grants":
          "description": |-
            The Unity Catalog privileges to grant to principals on this securable.
          "markdown_description": |-
            A Sequence of Unity Catalog privilege grants on this securable, where each item grants a set of `privileges` to a `principal` (a user, group, or service principal).

            See [\_](/data-governance/unity-catalog/manage-privileges/index.md).
          "markdown_examples": |-
            ```yaml
            grants:
              - principal: account users
                privileges:
                  - SELECT
              - principal: data-engineers
                privileges:
                  - ALL_PRIVILEGES
            ```
        "lifecycle":
          "description": |-
            Settings that control the deployment lifecycle of the resource, such as preventing it from being destroyed.
    "secret_scopes":
      "description": |-
        The secret scope definitions for the bundle, where each key is the name of the secret scope.
      "markdown_description": |-
        The secret scope definitions for the bundle, where each key is the name of the secret scope. See [\_](/dev-tools/bundles/resources.md#secret_scopes).
      "$fields":
        "backend_type":
          "description": |-
            The backend type the scope will be created with. If not specified, will default to `DATABRICKS`
        "keyvault_metadata":
          "description": |-
            The metadata for the secret scope if the `backend_type` is `AZURE_KEYVAULT`
        "lifecycle":
          "description": |-
            Settings that control the deployment lifecycle of the resource, such as preventing it from being destroyed.
        "name":
          "description": |-
            Scope name requested by the user. Scope names are unique.
        "permissions":
          "description": |-
            The permissions to apply to the secret scope. Permissions are managed via secret scope ACLs.
          "$fields":
            "group_name":
              "description": |-
                The name of the group granted the permission level. This field translates to a `principal` field in secret scope ACL.
            "level":
              "description": |-
                The permission level to apply. The allowed levels depend on the resource type.
              "$type":
                "enum":
                  - |-
                    READ
                  - |-
                    WRITE
                  - |-
                    MANAGE
            "service_principal_name":
              "description": |-
                The application ID of an active service principal. This field translates to a `principal` field in secret scope ACL.
            "user_name":
              "description": |-
                The name of the user granted the permission level. This field translates to a `principal` field in secret scope ACL.
    "sql_warehouses":
      "description": |-
        The SQL warehouse definitions for the bundle, where each key is the name of the warehouse.
      "markdown_description": |-
        The SQL warehouse definitions for the bundle, where each key is the name of the warehouse. See [\_](/dev-tools/bundles/resources.md#sql_warehouses).
      "$fields":
        "channel":
          "$fields":
            "dbsql_version":
              "description": |-
                PLACEHOLDER
            "name":
              "description": |-
                PLACEHOLDER
        "enable_photon":
          "description": |-
            Configures whether the warehouse should use Photon optimized clusters.

            Defaults to true.
        "lifecycle":
          "description": |-
            Settings that control the deployment lifecycle of the resource, such as preventing it from being destroyed.
        "permissions":
          "description": |-
            The permissions to apply to this resource.
          "markdown_description": |-
            A Sequence of permissions to apply to this resource, where each item grants a permission `level` to a single `user_name`, `group_name`, or `service_principal_name`. A principal cannot be set in both a resource's `permissions` and the top-level `permissions` mapping.

            See [\_](/dev-tools/bundles/settings.md#permissions) and [\_](/dev-tools/bundles/permissions.md).
          "markdown_examples": |-
            ```yaml
            permissions:
              - level: CAN_VIEW
                group_name: test-group
              - level: CAN_MANAGE
                user_name: someone@example.com
              - level: CAN_RUN
                service_principal_name: 123456-abcdef
            ```
          "$fields":
            "group_name":
              "description": |-
                The name of the group granted the permission level.
            "level":
              "description": |-
                The permission level to apply. The allowed levels depend on the resource type.
            "service_principal_name":
