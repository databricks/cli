github.com/databricks/databricks-sdk-go/service/compute.LogAnalyticsInfo:
  "log_analytics_primary_key":
    "description": |-
      The primary key for the Azure Log Analytics agent configuration
  "log_analytics_workspace_id":
    "description": |-
      The workspace ID for the Azure Log Analytics agent configuration
github.com/databricks/databricks-sdk-go/service/jobs.DashboardTask:
  "filters":
    "description": |-
      Dashboard task parameters. Used to apply dashboard filter values during dashboard task execution. Parameter values get applied to any dashboard filters that have a matching URL identifier as the parameter key.
      The parameter value format is dependent on the filter type:
      - For text and single-select filters, provide a single value (e.g. `"value"`)
      - For date and datetime filters, provide the value in ISO 8601 format (e.g. `"2000-01-01T00:00:00"`)
      - For multi-select filters, provide a JSON array of values (e.g. `"[\"value1\",\"value2\"]"`)
      - For range and date range filters, provide a JSON object with `start` and `end` (e.g. `"{\"start\":\"1\",\"end\":\"10\"}"`)
github.com/databricks/databricks-sdk-go/service/jobs.SparseCheckout:
  "patterns":
    "description": |-
      List of patterns to include for sparse checkout.
github.com/databricks/databricks-sdk-go/service/pipelines.PipelineLibrary:
  "whl":
    "deprecation_message": |-
      This field is deprecated
github.com/databricks/databricks-sdk-go/service/postgres.EndpointGroupSpec:
  "max":
    "description": |-
      The maximum number of computes in the endpoint group. Currently, this must be equal to min. Set to 1 for single
      compute endpoints, to disable HA. To manually suspend all computes in an endpoint group, set disabled to
      true on the EndpointSpec.
  "min":
    "description": |-
      The minimum number of computes in the endpoint group. Currently, this must be equal to max. This must be greater
      than or equal to 1.
permissions.*:
  "-":
    "description": |-
      Defines a permission for a specific entity.
    "markdown_description": |-
      Defines a permission for a specific entity. See [\_](/dev-tools/bundles/settings.md#permissions) and [\_](/dev-tools/bundles/permissions.md).
  "group_name":
    "description": |-
      The name of the group that has the permission set in level.
  "level":
    "description": |-
      The allowed permission for user, group, service principal defined for this permission.
  "service_principal_name":
    "description": |-
      The name of the service principal that has the permission set in level.
  "user_name":
    "description": |-
      The name of the user that has the permission set in level.
presets:
  "artifacts_dynamic_version":
    "description": |-
      Whether to enable dynamic_version on all artifacts.
  "jobs_max_concurrent_runs":
    "description": |-
      The maximum concurrent runs for a job.
  "name_prefix":
    "description": |-
      The prefix for job runs of the bundle.
  "pipelines_development":
    "description": |-
      Whether pipeline deployments should be locked in development mode.
  "source_linked_deployment":
    "description": |-
      Whether to link the deployment to the bundle source.
  "tags":
    "description": |-
      The tags for the bundle deployment.
  "trigger_pause_status":
    "description": |-
      A pause status to apply to all job triggers and schedules. Valid values are PAUSED or UNPAUSED.
python:
  "mutators":
    "description": |-
      Mutators contains a list of fully qualified function paths to mutator functions.

      Example: ["my_project.mutators:add_default_cluster"]
  "resources":
    "description": |-
      Resources contains a list of fully qualified function paths to load resources
      defined in Python code.

      Example: ["my_project.resources:load_resources"]
  "venv_path":
    "description": |-
      VEnvPath is path to the virtual environment.

      If enabled, Python code will execute within this environment. If disabled,
      it defaults to using the Python interpreter available in the current shell.
