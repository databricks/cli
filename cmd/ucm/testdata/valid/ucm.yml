ucm:
  name: fixture-valid

workspace:
  host: https://example.cloud.databricks.com

resources:

  storage_credentials:
    michele-test:
      name: michele-test
      comment: "Managed identity credential managed by UCM"
      azure_managed_identity:
        access_connector_id: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/example-rg/providers/Microsoft.Databricks/accessConnectors/example-connector
  catalogs:
    team_alpha:
      name: team_alpha
      comment: alpha catalog
      tags:
        cost_center: "1234"
        data_owner: alpha
        classification: internal

  schemas:
    bronze:
      catalog_name: team_alpha
      name: bronze
      tags:
        cost_center: "1234"
        data_owner: alpha
        classification: internal

  grants:
    alpha_read:
      securable: {type: catalog, name: team_alpha}
      principal: alpha-readers
      privileges: [USE_CATALOG, SELECT]

  tag_validation_rules:
    enforce_ownership:
      securable_types: [catalog, schema]
      required: [cost_center, data_owner, classification]
      allowed_values:
        classification: [public, internal, confidential, restricted]
