version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "go"
  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "go"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
