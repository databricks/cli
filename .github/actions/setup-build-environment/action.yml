name: 'Setup Build Environment'
description: 'Sets up the build environment with Go, Python, uv, and ruff'

inputs:
  cache-key:
    description: 'Cache key identifier for Go cache'
    required: true

runs:
  using: 'composite'
  steps:
    # Mount a ReFS Dev Drive on Windows and route Go's cache dirs, TEMP, and
    # the workspace onto it. The default C: drive on GH runners is ~4.3k IOPS;
    # a Dev Drive is ~127k. The `-DevDrive` flag is Win11 22621+ / WS2025;
    # older hosts fall back to plain ReFS which is still markedly faster than C:.
    # Must run before setup-go so GOCACHE/GOMODCACHE save/restore lands on the
    # drive, and before checkout so the workspace junction is in place.
    #
    # The volume is mounted at C:\dd (no drive letter) so every path the test
    # process sees starts with C:\. Same-drive paths are required so older
    # databricks-bundles tests under bundle/python/* don't trip
    # `ValueError: Paths don't have the same drive` from os.path.commonpath.
    - name: Mount ReFS Dev Drive (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $vhdPath = "$env:RUNNER_TEMP\devdrive.vhdx"
        New-VHD -Path $vhdPath -SizeBytes 20GB -Dynamic | Out-Null
        $disk = Mount-VHD -Path $vhdPath -Passthru |
          Initialize-Disk -PartitionStyle GPT -Passthru
        $part = New-Partition -DiskNumber $disk.Number -UseMaximumSize -DriveLetter Z
        try {
          Format-Volume -DriveLetter Z -FileSystem ReFS -DevDrive `
            -NewFileSystemLabel DevDrive -Confirm:$false -Force | Out-Null
        } catch {
          Format-Volume -DriveLetter Z -FileSystem ReFS `
            -NewFileSystemLabel DevDrive -Confirm:$false -Force | Out-Null
        }

        $mount = 'C:\dd'
        New-Item -ItemType Directory -Force -Path $mount | Out-Null
        Add-PartitionAccessPath -DiskNumber $disk.Number `
          -PartitionNumber $part.PartitionNumber -AccessPath $mount
        Remove-PartitionAccessPath -DiskNumber $disk.Number `
          -PartitionNumber $part.PartitionNumber -AccessPath 'Z:\'

        New-Item -ItemType Directory -Path C:\dd\tmp,C:\dd\go-build,C:\dd\go-mod,C:\dd\go-tmp,C:\dd\ws | Out-Null

        "TMP=C:\dd\tmp"           | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "TEMP=C:\dd\tmp"          | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "GOCACHE=C:\dd\go-build"  | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "GOMODCACHE=C:\dd\go-mod" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "GOTMPDIR=C:\dd\go-tmp"   | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

        # Junction the workspace onto the Dev Drive. Both paths start with C:\
        # so os.path.commonpath stays happy while file I/O lands on ReFS.
        $ws = $env:GITHUB_WORKSPACE
        if (Test-Path $ws) {
          if ((Get-ChildItem -Force $ws | Measure-Object).Count -gt 0) {
            throw "GITHUB_WORKSPACE ($ws) is not empty; refusing to junction over it."
          }
          Remove-Item -Force $ws
        }
        New-Item -ItemType Junction -Path $ws -Target C:\dd\ws | Out-Null

        fsutil devdrv query $mount

    - name: Checkout repository and submodules
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup JFrog
      uses: ./.github/actions/setup-jfrog

    - name: Create cache identifier
      run: echo "${{ inputs.cache-key }}" > cache.txt
      shell: bash

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache-dependency-path: |
          go.sum
          cache.txt

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.8.9"

    - name: Install Python versions for tests
      run: go tool -modfile=tools/task/go.mod task install-pythons
      shell: bash

    - name: Install ruff (Python linter and formatter)
      uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
      with:
        version: "0.9.1"
        args: "--version"
