name: 'Setup Build Environment'
description: 'Sets up the build environment with Go, Python, uv, and ruff'

inputs:
  cache-key:
    description: 'Cache key identifier for Go cache'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup JFrog
      uses: ./.github/actions/setup-jfrog

    - name: Create cache identifier
      run: echo "${{ inputs.cache-key }}" > cache.txt
      shell: bash

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache-dependency-path: |
          go.sum
          cache.txt

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.8.9"

    - name: Install Python versions for tests
      run: make install-pythons
      shell: bash

    - name: Install ruff (Python linter and formatter)
      uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
      with:
        version: "0.9.1"
        args: "--version"
