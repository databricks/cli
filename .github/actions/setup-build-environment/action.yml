name: 'Setup Build Environment'
description: 'Sets up the build environment with Go, Python, uv, and ruff'

inputs:
  cache-key:
    description: 'Cache key identifier for Go cache'
    required: true

runs:
  using: 'composite'
  steps:
    # Mount a ReFS Dev Drive on Windows and junction the workspace onto it so
    # every checkout / build / test file physically lives on the fast volume.
    # The default C: drive on GH runners is ~4.3k IOPS; a Dev Drive is ~127k.
    # The `-DevDrive` flag is Win11 22621+ / WS2025; older hosts fall back to
    # plain ReFS which is still markedly faster than C:.
    #
    # We use a directory junction (not a Z: cwd) so that path-inspecting tools
    # -- e.g. the Python mutator's `os.path.commonpath` in older
    # databricks-bundles -- still see the original C:\ path and don't trip the
    # "Paths don't have the same drive" error.
    #
    # The junction happens before the composite's own `actions/checkout` step
    # re-populates the workspace (via the junction, physically on Z:).
    - name: Mount ReFS Dev Drive and junction workspace (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Set-Location C:\

        $vhdPath = "$env:RUNNER_TEMP\devdrive.vhdx"
        New-VHD -Path $vhdPath -SizeBytes 20GB -Dynamic | Out-Null
        $disk = Mount-VHD -Path $vhdPath -Passthru |
          Initialize-Disk -PartitionStyle GPT -Passthru
        New-Partition -DiskNumber $disk.Number -UseMaximumSize -DriveLetter Z | Out-Null
        try {
          Format-Volume -DriveLetter Z -FileSystem ReFS -DevDrive `
            -NewFileSystemLabel DevDrive -Confirm:$false -Force | Out-Null
        } catch {
          Format-Volume -DriveLetter Z -FileSystem ReFS `
            -NewFileSystemLabel DevDrive -Confirm:$false -Force | Out-Null
        }

        $ws = $env:GITHUB_WORKSPACE
        Remove-Item -Recurse -Force -LiteralPath $ws
        New-Item -ItemType Directory -Path Z:\workspace | Out-Null
        New-Item -ItemType Junction -Path $ws -Target Z:\workspace | Out-Null

        New-Item -ItemType Directory -Path Z:\go-build,Z:\go-mod,Z:\go-tmp | Out-Null
        "GOCACHE=Z:\go-build"  | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "GOMODCACHE=Z:\go-mod" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        "GOTMPDIR=Z:\go-tmp"   | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

    - name: Checkout repository and submodules
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup JFrog
      uses: ./.github/actions/setup-jfrog

    - name: Create cache identifier
      run: echo "${{ inputs.cache-key }}" > cache.txt
      shell: bash

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache-dependency-path: |
          go.sum
          cache.txt

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.8.9"

    - name: Install Python versions for tests
      run: make install-pythons
      shell: bash

    - name: Install ruff (Python linter and formatter)
      uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
      with:
        version: "0.9.1"
        args: "--version"
