name: 'Setup Build Environment'
description: 'Sets up the build environment with Go, Python, uv, and ruff'

inputs:
  cache-key:
    description: 'Cache key identifier for Go cache'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Create cache identifier
      run: echo "${{ inputs.cache-key }}" > cache.txt
      shell: bash

    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod
        cache-dependency-path: |
          go.sum
          cache.txt

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        version: "0.8.9"

    - name: Install Python versions for patchwheel tests
      run: uv python install 3.9 3.10 3.11 3.12 3.13
      shell: bash

    - name: Install ruff (Python linter and formatter)
      uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3.6.1
      with:
        version: "0.9.1"
        args: "--version"

    - name: Pull external libraries
      run: |
        go mod download
        pip3 install wheel==0.45.1
      shell: bash
