name: 'Setup Build Environment'
description: 'Sets up the build environment with Go, Python, uv, and ruff'

inputs:
  cache-key:
    description: 'Cache key identifier for Go cache'
    required: true
  is-fork:
    description: 'Whether this is a fork PR (uses pre-warmed Go module cache instead of JFrog)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup JFrog
      if: inputs.is-fork == 'false'
      uses: ./.github/actions/setup-jfrog

    # Fork path: restore the pre-warmed Go module cache instead of using JFrog.
    # The cache is populated by the warmGoCache workflow and contains modules
    # downloaded through JFrog on the main branch. See: .github/workflows/warmGoCache.yml
    - name: Restore Go module cache (fork)
      if: inputs.is-fork == 'true'
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/go/pkg/mod/cache/download
        key: go-modules-${{ runner.os }}-${{ hashFiles('go.sum') }}
        restore-keys: go-modules-${{ runner.os }}-

    - name: Configure Python to use PyPI (fork)
      if: inputs.is-fork == 'true'
      shell: bash
      run: |
        echo "UV_INDEX_URL=https://pypi.org/simple" >> "$GITHUB_ENV"
        echo "PIP_INDEX_URL=https://pypi.org/simple" >> "$GITHUB_ENV"

    - name: Create cache identifier
      run: echo "${{ inputs.cache-key }}" > cache.txt
      shell: bash

    # Non-fork: use setup-go with built-in cache (backed by JFrog proxy)
    - name: Setup Go
      if: inputs.is-fork == 'false'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache-dependency-path: |
          go.sum
          cache.txt

    # Fork: setup-go without built-in cache; the warmer workflow manages the cache
    - name: Setup Go (fork)
      if: inputs.is-fork == 'true'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: false

    # Point Go at the restored module cache so no network access to JFrog is needed.
    # Go's file:// proxy reads the same proxy-format layout that 'go mod download' writes.
    - name: Configure Go to use pre-warmed module cache (fork)
      if: inputs.is-fork == 'true'
      shell: bash
      run: |
        echo "GOPROXY=file://$(go env GOMODCACHE)/cache/download,off" >> "$GITHUB_ENV"
        echo "GONOSUMDB=*" >> "$GITHUB_ENV"

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.8.9"

    - name: Install Python versions for tests
      run: make install-pythons
      shell: bash

    - name: Install ruff (Python linter and formatter)
      uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
      with:
        version: "0.9.1"
        args: "--version"
