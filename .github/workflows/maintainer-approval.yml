name: PR approval

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  merge_group:
    types: [checks_requested]

concurrency:
  group: pr-approval-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Auto-approve maintainer-approval for merge queue entries.
  # PRs are already approved before entering the merge queue,
  # so we just need to set the status on the merge queue commit.
  merge-queue-approval:
    if: ${{ github.event_name == 'merge_group' }}
    runs-on:
      group: databricks-deco-testing-runner-group
      labels: ubuntu-latest-deco
    permissions:
      statuses: write
    steps:
      - name: Auto-approve for merge queue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              context: 'maintainer-approval',
              state: 'success',
              description: 'Auto-approved (merge queue)',
            });

  check:
    runs-on:
      group: databricks-deco-testing-runner-group
      labels: ubuntu-latest-deco
    if: ${{ github.event_name != 'merge_group' && !github.event.pull_request.draft }}
    timeout-minutes: 5
    permissions:
      pull-requests: write
      statuses: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
          fetch-depth: 0
      - name: Check approval and suggest reviewers
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          retries: 3
          script: |-
            const script = require('./.github/workflows/maintainer-approval.js');
            await script({ context, github, core });
