version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - intrange
    - mirror
    - perfsprint
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unused
    - exhaustruct
    - exhaustive
    - copyloopvar
    - forbidigo
    - depguard
    - usestdlibvars
    - nilerr
    - fatcontext
    - wastedassign
    - nosprintfhostport
    - recvcheck
    - usetesting
    - dupword
    - misspell
    - nilnesserr
    - durationcheck
    - exptostd
    - gocheckcompilerdirectives
    - asciicheck
    - reassign
  settings:
    depguard:
      rules:
        no-experimental-imports:
          # depguard matches against absolute file paths, so patterns must
          # start with **/ to match regardless of the repository location.
          files:
            - "**"
            - "!**/cmd/cmd.go"
            - "!**/cmd/experimental/**"
            - "!**/experimental/**"
          deny:
            - pkg: "github.com/databricks/cli/experimental"
              desc: "must not import experimental/ packages; use an interface or move the dependency"
        no-legacy-rand:
          deny:
            - pkg: "math/rand$"
              desc: "use math/rand/v2 instead of math/rand"
        no-stdlib-log:
          files:
            - "**"
            - "!**/bundle/docsgen/**"
            - "!**/bundle/internal/schema/**"
            - "!**/bundle/internal/validation/**"
          deny:
            - pkg: "log$"
              desc: "use libs/log instead of the standard library log package"
    forbidigo:
      forbid:
        - pattern: 'term\.IsTerminal'
          msg: Use cmdio.IsPromptSupported(ctx) to check for a TTY.
        - pattern: 'isatty\.IsTerminal'
          msg: Use cmdio.IsPromptSupported(ctx) to check for a TTY.
        - pattern: 'isatty\.IsCygwinTerminal'
          msg: Use cmdio.IsPromptSupported(ctx) to check for a TTY.
        - pattern: 'os\.UserHomeDir'
          msg: Use env.UserHomeDir(ctx) from libs/env instead.
        - pattern: 'os\.Getenv'
          msg: Use env.Get(ctx) from the libs/env package instead of os.Getenv.
        - pattern: 'sort\.Slice'
          msg: Use slices.SortFunc from the standard library instead.
        - pattern: 'sort\.SliceStable'
          msg: Use slices.SortStableFunc from the standard library instead.
        - pattern: 'sort\.Strings'
          msg: Use slices.Sort from the standard library instead.
        - pattern: 'sort\.Ints'
          msg: Use slices.Sort from the standard library instead.
        - pattern: 'sort\.Float64s'
          msg: Use slices.Sort from the standard library instead.
        - pattern: 'os\.IsNotExist'
          msg: Use errors.Is(err, fs.ErrNotExist) instead.
        - pattern: 'os\.IsExist'
          msg: Use errors.Is(err, fs.ErrExist) instead.
        - pattern: 'os\.IsPermission'
          msg: Use errors.Is(err, fs.ErrPermission) instead.
        - pattern: 'sync\.Once\b($|[^FV])'
          msg: Use sync.OnceFunc, sync.OnceValue, or sync.OnceValues instead.
      analyze-types: true
    copyloopvar:
      check-alias: true
    errcheck:
      exclude-functions:
        - (*github.com/spf13/cobra.Command).RegisterFlagCompletionFunc
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - (*github.com/spf13/pflag.FlagSet).MarkDeprecated
        - (*github.com/spf13/pflag.FlagSet).MarkHidden
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
          exclude:
            - TEST
            - "**/integration/**"
            - "**/internal/testcli/**"
            - "**/internal/testutil/**"
            - "**/libs/testdiff/**"
            - "**/libs/python/pythontest/**"
        - name: context-keys-type
        - name: error-return
        - name: errorf
        - name: range-val-in-closure
        - name: waitgroup-by-value
        - name: unconditional-recursion
        - name: use-waitgroup-go
    gocritic:
      disable-all: true
      enabled-checks:
        - ruleguard
        - offBy1
      settings:
        ruleguard:
          failOn: all
          rules: libs/gorules/rule_*.go
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
      settings:
        printf:
          funcs:
            - (github.com/databricks/cli/internal/testutil.TestingT).Infof
            - (github.com/databricks/cli/internal/testutil.TestingT).Errorf
            - (github.com/databricks/cli/internal/testutil.TestingT).Fatalf
            - (github.com/databricks/cli/internal/testutil.TestingT).Skipf
    staticcheck:
      checks:
        - all
        # disabled checks:
        - -ST1003
    testifylint:
      enable-all: true
      disable:
        - require-error # good check, but we have too many assert.(No)?Errorf? so excluding for now
        - empty
        - len
        - equal-values
        - encoded-compare # Always replaces Equal() with JSONEq, but sometimes exact string match is wanted for JSON
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path-except: bundle/direct/dresources|bundle/config/mutator/load_dbalert_files.go
        linters:
          - exhaustruct
      - path: bundle/direct/dresources/.*_test.go
        linters:
          - exhaustruct
      - text: "Use env\\.Get"
        path: "_test\\.go$"
        linters:
          - forbidigo
      # TODO: remove these exceptions by moving the dependency out of experimental/.
      - path: cmd/apps/init.go
        linters:
          - depguard
issues:
  max-issues-per-linter: 1000
  max-same-issues: 1000
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      rewrite-rules:
        - pattern: a[b:len(a)]
          replacement: a[b:]
        - pattern: interface{}
          replacement: any
    gofumpt:
      module-path: github.com/databricks/cli
      extra-rules: true
  exclusions:
    generated: lax
