Ignore = [
    "home"
]

# Non-admin user: the account verification call is account-admin-only.
[[Server]]
Pattern = "GET /api/2.0/accounts/acct-456/workspaces"
Response.Body = '''
{
    "error_code": "PERMISSION_DENIED",
    "message": "This API is disabled for users without account admin status. Contact your account admin for access."
}
'''
Response.StatusCode = 403

# The account console cannot serve workspace APIs.
[[Server]]
Pattern = "GET /api/2.0/preview/scim/v2/Me"
Response.Body = 'Unable to load OAuth Config'
Response.StatusCode = 400
