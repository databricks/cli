Local = true
Cloud = false

[Env]
MSYS_NO_PATHCONV = "1"

# Return 403 PERMISSION_DENIED for workspace/get-status.
# This is the first API call made by export-dir (via Stat() in filerFS.Open).
[[Server]]
Pattern = "GET /api/2.0/workspace/get-status"
Response.StatusCode = 403
Response.Body = '{"error_code": "PERMISSION_DENIED", "message": "User does not have READ permission on /test-dir."}'
