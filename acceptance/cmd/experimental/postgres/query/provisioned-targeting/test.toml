GOOS.windows = false

[[Server]]
Pattern = "GET /api/2.0/database/instances/starting-instance"
Response.Body = '''
{
    "name": "starting-instance",
    "state": "STARTING",
    "read_write_dns": "starting.example.com"
}
'''

[[Server]]
Pattern = "GET /api/2.0/database/instances/no-dns-instance"
Response.Body = '''
{
    "name": "no-dns-instance",
    "state": "AVAILABLE"
}
'''

[[Server]]
Pattern = "GET /api/2.0/database/instances/missing-instance"
Response.StatusCode = 404
Response.Body = '''
{
    "error_code": "NOT_FOUND",
    "message": "instance not found"
}
'''
