Local = true
Cloud = false

Ignore = [
    "home"
]

[[Server]]
Pattern = "GET /api/2.0/preview/scim/v2/Me"
Response.Body = '''
{
  "userName": "test@example.com"
}
'''

[[Server]]
Pattern = "HEAD /"
Response.Body = ''

# The toolchain check reports local tool versions which vary by machine and CI image.
[[Repls]]
Old = 'Toolchain: info - .*'
New = 'Toolchain: info - [TOOLCHAIN]'
