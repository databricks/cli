Local = true
Cloud = false

[Env]
  PYTHONDONTWRITEBYTECODE = "1"
  PYTHONUNBUFFERED = "1"
  PYTHONUTF8 = "1"
  UV_PYTHON = "3.10"

[EnvMatrix]
  DATABRICKS_BUNDLE_ENGINE = ["terraform", "direct-exp"]
  UV_ARGS = ["--with databricks-bundles==0.7.3", "--with-requirements requirements-latest.txt --no-cache"]
