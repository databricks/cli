bundle:
  name: foobar

resources:
  pipelines:
    my_pipeline:
      name: ${var.foo}
      continuous: ${var.baz}
      clusters:
        - num_workers: ${var.bar}

variables:
  foo:
    default: "a_string"
    description: "A string variable"

  bar:
    default: 42
    description: "An integer variable"

  baz:
    default: true
    description: "A boolean variable"

  w_lookup:
    description: "A variable with a lookup"
    lookup:
      cluster: "some-test-cluster" # id 4321

targets:
  use-default-variable-values:

  override-string-variable:
    variables:
      foo: "overridden_string"

  override-int-variable:
    variables:
      bar: 43

  override-both-bool-and-string-variables:
    variables:
      foo: "overridden_string"
      baz: false

  override-lookup-variable-with-value:
    variables:
      w_lookup: "my-specific-cluster-id"

  override-lookup-variable-with-lookup:
    variables:
      w_lookup:
        lookup:
          cluster: "some-other-cluster" # id 9876
