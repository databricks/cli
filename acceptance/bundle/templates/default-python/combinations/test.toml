Cloud = true

# Skip on Windows -- 18 matrix variants at ~1m7s each cost ~20m of cumulative
# Windows test time. Linux/macOS runs cover the full matrix; seeing the
# single `templates/default-python/classic` test succeed on Windows is enough
# signal that the template machinery works there.
GOOS.windows = false

Ignore = ["input.json"]

EnvMatrix.READPLAN = ["", "1"]

# Using shortcuts, because max path component name on Windows is 256 chars
# INCLUDE_NOTEBOOK
EnvMatrix.NBOOK = ["yes", "no"]

# INCLUDE_DLT
EnvMatrix.DLT = ["yes", "no"]

# INCLUDE_PYTHON
EnvMatrix.PY = ["yes", "no"]

[[Repls]]
Old = '202\d{5}.\d{5,}'
New = '[VERSION_TIMESTAMP]'

[[Repls]]
Old = '\\'
New = '/'
