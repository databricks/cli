Cloud = true

# 18 matrix variants at ~1m7s each cost ~20m of cumulative time on windows
# alone. The CLI behavior is OS-agnostic; linux covers the full matrix. On
# windows/macos the `classic/` smoke is enough to prove the template
# machinery works.
GOOS.windows = false
GOOS.darwin = false

Ignore = ["input.json"]

EnvMatrix.READPLAN = ["", "1"]

# Using shortcuts, because max path component name on Windows is 256 chars
# INCLUDE_NOTEBOOK
EnvMatrix.NBOOK = ["yes", "no"]

# INCLUDE_DLT
EnvMatrix.DLT = ["yes", "no"]

# INCLUDE_PYTHON
EnvMatrix.PY = ["yes", "no"]

[[Repls]]
Old = '202\d{5}.\d{5,}'
New = '[VERSION_TIMESTAMP]'

[[Repls]]
Old = '\\'
New = '/'
