# Tests endpoint + index with interdependence (index depends on endpoint).
# Index uses DELTA_SYNC; set VECTOR_INDEX_SOURCE_TABLE to a Delta table with embedding config if default (workspace.default.covid_monthly_summary) is not available.

Local = true
Cloud = true
RecordRequests = false

Ignore = [
    ".databricks",
    "databricks.yml",
]

[EnvMatrix]
  DATABRICKS_BUNDLE_ENGINE = ["direct"]
