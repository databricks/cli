bundle:
  name: job-runs-notebook-change

resources:
  jobs:
    my_job:
      name: my-job
      tasks:
        - task_key: main
          notebook_task:
            notebook_path: /Workspace/test

  job_runs:
    my_run:
      job_id: ${resources.jobs.my_job.id}
      job_parameters:
        env: dev
