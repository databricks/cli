bundle:
  name: test-bundle

resources:
  jobs:
    some_other_job:
      name: "[${bundle.target}] Test Wheel Job"
      tasks:
        - task_key: TestTask
          new_cluster:
            num_workers: 1
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            data_security_mode: USER_ISOLATION
            instance_pool_id: my-instance-pool
          python_wheel_task:
            package_name: my_test_code
            entry_point: run
            parameters:
              - "one"
              - "two"
