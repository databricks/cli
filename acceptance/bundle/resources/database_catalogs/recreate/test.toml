Local = true
Cloud = true

# Mitigates running into quota limits in workspaces
CloudSlow = true

RecordRequests = false
RunsOnDbr = true

# database_catalog updates are not supported by the API, so this test only
# meaningfully exercises the direct engine. Terraform attempts an update and
# fails on the real API.
EnvMatrix.DATABRICKS_BUNDLE_ENGINE = ["direct"]
