Local = true
Cloud = false # This currently fails on Cloud due to incorrect API behaviour.
RecordRequests = true

Ignore = [".databricks", "databricks.yml"]

# App deployment progress messages are non-deterministic on cloud (different status messages
# per poll), so filter them out entirely.
[[Repls]]
Old = '(?m)^✓ [^\n]*\n'
New = ""

[EnvMatrix]
  DATABRICKS_BUNDLE_ENGINE = ["direct"]
