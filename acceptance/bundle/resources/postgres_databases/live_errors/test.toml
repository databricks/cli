Local = true
Cloud = true
RequiresUnityCatalog = true

# Error-path tests only assert via output.txt; recording requests adds noise
# (and on cloud, flaky timestamps/operation IDs).
RecordRequests = false

# Lakebase v2 (postgres) is only available in AWS as of January 2026
CloudEnvs.gcp = false
CloudEnvs.azure = false

# Error-path tests don't iterate cleanly under terraform: the terraform engine
# rolls back to its prior state on a partial failure, which makes the recorded
# output diverge from the direct engine. Run them on direct only; the error
# surface is the same regardless of engine.
EnvMatrix.DATABRICKS_BUNDLE_ENGINE = ["direct"]

Ignore = [
    "databricks.yml",
    ".databricks",
]

[[Repls]]
# Clean up ?o=<num> suffix after URL since not all workspaces have that
Old = '\?o=\[(NUMID|ALPHANUMID)\]'
New = ''
Order = 1000

[[Repls]]
# Normalize branch UIDs (br-xxx-yyy-zzz format)
Old = 'br-[a-z0-9-]+'
New = '[BRANCH_UID]'
Order = 1

[[Repls]]
# Normalize project UIDs (proj-xxx-yyy-zzz format)
Old = 'proj-[a-z0-9]+-[a-z0-9]+-[a-z0-9]+-[a-z0-9]'
New = '[PROJECT_UID]'
Order = 1
