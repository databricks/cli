bundle:
  name: test-bundle

resources:
  jobs:
    src:
      name: source
      tasks:
        - task_key: main
          libraries:
            - whl: /path/to/wheel.whl
          notebook_task:
            notebook_path: /Workspace/notebook
    dst:
      # TF path: "task[0].library[0].whl" — "task" is TF name for DABs "tasks",
      # "library" is TF name for DABs "libraries". Both are list-blocks in TF.
      # Direct engine: TerraformPathToDABs translates both renames.
      name: "dst job ${resources.jobs.src.task[0].library[0].whl}"
