bundle:
  name: test-bundle

resources:
  jobs:
    src:
      name: source
      trigger:
        file_arrival:
          url: abfss://container@account.dfs.core.windows.net/path
    dst:
      # trigger[0].file_arrival[0]: two levels of TF list-block syntax.
      # [0] on a mapping is a no-op in dyn; field names are the same in TF and DABs.
      name: ${resources.jobs.src.trigger[0].file_arrival[0].url}
