bundle:
  name: test-bundle

resources:
  jobs:
    src:
      name: source
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
    dst:
      # schedule[0]: TF list-block syntax; [0] on a mapping is a no-op in dyn.
      # schedule.quartz_cron_expression has the same name in TF and DABs.
      name: ${resources.jobs.src.schedule[0].quartz_cron_expression}
