bundle:
  name: test-bundle

resources:
  jobs:
    src:
      name: source
      git_source:
        git_branch: main
        git_url: https://github.com/databricks/cli
        git_provider: gitHub
    dst:
      # TF path: "git_source[0].branch" — git_source is a TF list-block ([0] required),
      # and "branch" is the TF field name for DABs "git_branch".
      # Direct engine: TerraformPathToDABs translates "branch" → "git_branch".
      name: ${resources.jobs.src.git_source[0].branch}
