bundle:
  name: test-bundle

# volume_path is computed locally during the initialize phase. It is a CLI-only
# field, not part of the volume's API state. When a component (catalog_name,
# schema_name, or name) is still an unresolved ${...} reference, that reference is
# embedded into volume_path instead of being dropped, so it can be resolved later
# during plan or deploy like any other reference.
#
# bar.name is ${resources.volumes.baz.id}, a remote value only known after baz is
# created. bar.volume_path is therefore computed at initialize as
# /Volumes/mycatalog/myschema/${resources.volumes.baz.id}, with the reference left
# intact. foo.comment = ${resources.volumes.bar.volume_path} picks up that string
# during initialize, and its embedded baz.id reference resolves at deploy, so foo
# is created with the fully resolved path (see the deploy requests below).
#
# Both validate and deploy are exercised. (baz.id is used rather than
# baz.storage_location only because the resolved value becomes bar's name, and the
# testserver cannot route a volume name that contains the slashes of a
# storage_location URL.)
resources:
  volumes:
    baz:
      catalog_name: mycatalog
      schema_name: myschema
      name: bazname
    bar:
      catalog_name: mycatalog
      schema_name: myschema
      name: ${resources.volumes.baz.id}
    foo:
      catalog_name: mycatalog
      schema_name: myschema
      name: fooname
      comment: ${resources.volumes.bar.volume_path}
