# jobs.delete_me is recorded in DMS (see script) but intentionally absent here,
# so the plan deletes it.
bundle:
  name: dms-plan

experimental:
  record_deployment_history: true

resources:
  jobs:
    # Not recorded in DMS -> plan should create it.
    create_me:
      name: create-me
    # Recorded in DMS with a different name -> plan should update it.
    update_me:
      name: update-me-new
