# config-remote-sync is not supported on Windows.
[GOOS]
windows = false

# Pinned to the direct engine. The terraform path of config-remote-sync reads
# the experimental yaml-sync state snapshot, which only the cloud test harness
# supports (all terraform config-remote-sync coverage lives in the Cloud=true
# acceptance/bundle/config-remote-sync tests). Direct is the default engine for
# new bundles, and the telemetry is engine-agnostic above the state layer.
[EnvMatrix]
  DATABRICKS_BUNDLE_ENGINE = ["direct"]
