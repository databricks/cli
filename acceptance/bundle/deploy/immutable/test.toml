Local = true
Cloud = true

# immutable_folder only works with the direct engine.
EnvMatrix.DATABRICKS_BUNDLE_ENGINE = ["direct"]

Ignore = [
    "dist",
    "databricks.yml",
    ".databricks",
    ".venv",
    "script",
    "*.pyc",
]

[[Repls]]
# Replace snapshot hash with SNAPSHOT_HASH
Old = "[0-9a-f]{64}"
New = "[SNAPSHOT_HASH]"
