bundle:
  name: wal-chain-test

resources:
  jobs:
    # Linear chain: job_01 -> job_02 -> job_03
    # Execution order: job_01 first, job_03 last
    job_01:
      name: "job-01"
      description: "first in chain"
      tasks:
        - task_key: "task"
          spark_python_task:
            python_file: ./test.py
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 0
    job_02:
      name: "job-02"
      description: "depends on ${resources.jobs.job_01.id}"
      tasks:
        - task_key: "task"
          spark_python_task:
            python_file: ./test.py
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 0
    job_03:
      name: "job-03"
      description: "depends on ${resources.jobs.job_02.id}"
      tasks:
        - task_key: "task"
          spark_python_task:
            python_file: ./test.py
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 0
