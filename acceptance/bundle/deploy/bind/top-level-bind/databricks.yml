bundle:
  name: test-bind-top-level

bind:
  jobs:
    foo:
      id: "123"

resources:
  jobs:
    foo:
      name: test-job
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: my_task
          environment_key: default
          spark_python_task:
            python_file: ./hello.py
