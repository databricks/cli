bundle:
  name: test-bundle

variables:
  AZURE:
    type: complex
    default:
      subscription: test-sub-123

resources:
  schemas:
    my_schema:
      catalog_name: main
      name: test-schema

  pipelines:
    my_pipeline:
      name: test-pipeline
      libraries:
        - file:
            path: pipeline.py
      configuration:
        europris.swipe.egress_streaming_schema: "${resources.schemas.my_schema.catalog_name}.${resources.schemas.my_schema.name}"
        europris.azure.subscription: ${var.AZURE.subscription}
