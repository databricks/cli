# Exclude configs added after v0.293.0 (no pre-generated state files for them).
EnvMatrixExclude.no_permission_ref = ["INPUT_CONFIG=job_permission_ref.yml.tmpl"]
EnvMatrixExclude.no_cross_resource_ref = ["INPUT_CONFIG=job_cross_resource_ref.yml.tmpl"]

# The following resources use name-based IDs (not numeric). State files store
# the unique name from the v0.293.0 deploy, but the mock server only recognizes
# its own pre-configured names, so reads return 404.
EnvMatrixExclude.no_dashboard = ["INPUT_CONFIG=dashboard.yml.tmpl"]
EnvMatrixExclude.no_database_catalog = ["INPUT_CONFIG=database_catalog.yml.tmpl"]
EnvMatrixExclude.no_secret_scope = ["INPUT_CONFIG=secret_scope.yml.tmpl"]
EnvMatrixExclude.no_synced_database_table = ["INPUT_CONFIG=synced_database_table.yml.tmpl"]
