Local = true
Cloud = true
RequiresUnityCatalog = true
Timeout = '10m'

Ignore = [
    ".databricks",
    ".venv",
    "databricks.yml",
    "plan.json",
    "*.py",
    "*.json",
    "*.err",
    "app",
]

EnvMatrix.DATABRICKS_BUNDLE_ENGINE = [
    "direct",
    # These tests work on terraform but commented out to save time on test run
    #"terraform",
]

EnvMatrix.INPUT_CONFIG = [
    "alert.yml.tmpl",
    "app.yml.tmpl",
    "catalog.yml.tmpl",
    "cluster.yml.tmpl",
    "cluster_apply_policy_default_values.yml.tmpl",
    "dashboard.yml.tmpl",
    "database_catalog.yml.tmpl",
    "database_instance.yml.tmpl",
    "experiment.yml.tmpl",
    "external_location.yml.tmpl",
    "genie_space.yml.tmpl",
    "job.yml.tmpl",
    "job_pydabs_10_tasks.yml.tmpl",
    "job_pydabs_1000_tasks.yml.tmpl",
    "job_cross_resource_ref.yml.tmpl",
    "job_permission_ref.yml.tmpl",
    "job_run_job_ref.yml.tmpl",
    "job_with_depends_on.yml.tmpl",
    "job_with_permissions.yml.tmpl",
    "job_with_task.yml.tmpl",
    "model.yml.tmpl",
    "model_with_permissions.yml.tmpl",
    "model_serving_endpoint.yml.tmpl",
    "pipeline.yml.tmpl",
    "pipeline_config_dots.yml.tmpl",
    "postgres_branch.yml.tmpl",
    "postgres_catalog.yml.tmpl",
    "postgres_database.yml.tmpl",
    "postgres_endpoint.yml.tmpl",
    "postgres_project.yml.tmpl",
    "postgres_role.yml.tmpl",
    "postgres_synced_table.yml.tmpl",
    "registered_model.yml.tmpl",
    "schema.yml.tmpl",
    "schema_grant_ref.yml.tmpl",
    "schema_uppercase_name.yml.tmpl",
    "schema_with_grants.yml.tmpl",
    "secret_scope.yml.tmpl",
    "secret_scope_default_backend_type.yml.tmpl",
    "secret_scope_with_permissions.yml.tmpl",
    "sql_warehouse.yml.tmpl",
    "synced_database_table.yml.tmpl",
    "vector_search_endpoint.yml.tmpl",
    "vector_search_index.yml.tmpl",
    "volume.yml.tmpl",
    "volume_external.yml.tmpl",
    "volume_uppercase_name.yml.tmpl",
]

[EnvMatrixExclude]
no_alert_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=alert.yml.tmpl"]

# job_run_job_ref sets a health rule value to 2^53+1 to exercise large-integer
# precision in state migration. The value is out of range for the real backend,
# so this config is local-only (the mock server stores it verbatim).
no_run_job_ref_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=job_run_job_ref.yml.tmpl"]

# Postgres resources only work on AWS
no_postgres_project_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=postgres_project.yml.tmpl"]
no_postgres_branch_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=postgres_branch.yml.tmpl"]
no_postgres_endpoint_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=postgres_endpoint.yml.tmpl"]
no_postgres_catalog_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=postgres_catalog.yml.tmpl"]
no_postgres_synced_table_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=postgres_synced_table.yml.tmpl"]
no_postgres_role_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=postgres_role.yml.tmpl"]
no_postgres_database_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=postgres_database.yml.tmpl"]

# External locations require actual storage credentials with cloud IAM setup
# which are environment-specific, so we only test locally with the mock server
no_external_location_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=external_location.yml.tmpl"]

# External volumes reference external locations; excluded from cloud for the same reason
no_external_volume_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=volume_external.yml.tmpl"]

# A vector search index takes 10-20 min to create, and these tests deploy it twice
# (deploy, then re-plan), making it by far the slowest variant on cloud. The dedicated
# vector_search_indexes resource test already covers it on cloud (CloudSlow), so exclude
# it here to keep the cloud invariant runs from timing out. Still exercised locally.
no_vector_search_index_on_cloud = ["CONFIG_Cloud=true", "INPUT_CONFIG=vector_search_index.yml.tmpl"]

# Fake SQL endpoint for local tests
[[Server]]
Pattern = "POST /api/2.0/sql/statements/"
Response.Body = '{"status": {"state": "SUCCEEDED"}, "manifest": {"schema": {"columns": []}}}'

[[Server]]
Pattern = "DELETE /api/2.1/unity-catalog/tables/{full_name}"
Response.Body = '{"status": "OK"}'
