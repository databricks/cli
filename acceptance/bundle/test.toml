# This allows recording per-deployment output files, e.g. $CLI bundle deploy > out.$DATABRICKS_BUNDLE_ENGINE.txt
EnvVaryOutput = "DATABRICKS_BUNDLE_ENGINE"

# The lowest Python version we support. Alternative to "uv run --python 3.10"
Env.UV_PYTHON = "3.10"

Ignore = ["databricks.yml"]

# User-agent:
[[Repls]]
Old = 'os/darwin'
New = 'os/[OS]'

[[Repls]]
Old = 'os/windows'
New = 'os/[OS]'

[[Repls]]
Old = 'os/linux'
New = 'os/[OS]'

[[Repls]]
Old = ' cicd/github'
New = ''

# serialized_dashboard is persisted in direct-engine state as a content hash. Mask the
# 64-char digest with a hash-specific token (not the generic [ALPHANUMID]) so the output
# reads clearly as a sha256 hash, at a low Order so it runs before the generic [NUMID] /
# [DASHBOARD_ID] rules that would otherwise split the hex into pieces.
[[Repls]]
Old = 'sha256:[0-9a-f]{64}'
New = 'sha256:[HASH]'
Order = -1
