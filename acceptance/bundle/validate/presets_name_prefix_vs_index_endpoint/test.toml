Badness = "Literal vector_search_indexes.*.endpoint_name is not rewritten by the name_prefix preset, even when it points at a bundle-managed endpoint that gets prefixed. The DABs convention is to use ${resources.vector_search_endpoints.X.name} (covered by vs_index_ref below), but the literal form silently breaks. Until apply_presets.go cross-references endpoint_name against bundle endpoints, prefer the reference form."
