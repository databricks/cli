# No bundle engine needed for this command.
[EnvMatrix]
DATABRICKS_BUNDLE_ENGINE = []

# One canned Genie SSE response covers all invocations in the script. The
# stream exercises the full pipeline: a reasoning item, a THOUGHT message, an
# execute_sql call whose .added event carries empty arguments (filled in on
# .done), the QUERY_EXECUTION result data, a VIZ spec joined to it, the
# FINAL_RESPONSE message with a viz image reference, and the completion event.
[[Server]]
Pattern = "POST /api/2.0/data-rooms/tools/onechat/responses"
Response.Body = '''
data: {"type":"response.output_item.added","output_index":0,"item":{"type":"reasoning","id":"r1","status":"in_progress"}}

data: {"type":"response.output_item.added","output_index":1,"item":{"type":"message","id":"t1","role":"assistant","status":"completed","content":[{"type":"output_text","text":"Looking at the sales data...","annotations":[]}],"metadata":{"ui_type":"THOUGHT","source_internal_ids":["m1"]}}}

data: {"type":"response.output_item.added","output_index":2,"item":{"type":"function_call","id":"f1","call_id":"c1","name":"execute_sql","arguments":""}}

data: {"type":"response.output_item.done","output_index":2,"item":{"type":"function_call","id":"f1","call_id":"c1","status":"completed","name":"execute_sql","arguments":"{\"sql\":\"SELECT franchise, SUM(total) AS total FROM sales GROUP BY franchise\",\"title\":\"Total by Franchise\"}"}}

data: {"type":"response.output_item.done","output_index":3,"item":{"type":"function_call_output","id":"o1","call_id":"c1","status":"completed","metadata":{"ui_type":"QUERY_EXECUTION","statement_id":"stmt1","result_data":{"columns":[{"name":"franchise"},{"name":"total"}],"preview_rows":[["Alpha",1250],["Beta",640]]}}}}

data: {"type":"response.output_item.done","output_index":4,"item":{"type":"function_call_output","id":"o2","call_id":"c2","status":"completed","metadata":{"ui_type":"VIZ","sql_id":"stmt1","embed_id":"viz_1","viz_definition":"{\"renderSpec\":{\"widgetType\":\"bar\",\"frame\":{\"title\":\"Total by Franchise\"},\"encodings\":{\"x\":{\"fieldName\":\"franchise\"},\"y\":{\"fieldName\":\"total\"}}}}"}}}

data: {"type":"response.output_item.added","output_index":5,"item":{"type":"message","id":"m1","role":"assistant","status":"completed","content":[{"type":"output_text","text":"Alpha leads with 1,250 total sales.\n\n![Total by Franchise](#viz_1)","annotations":[]}],"metadata":{"ui_type":"FINAL_RESPONSE","source_internal_ids":["x1"]}}}

data: {"type":"response.completed","response":{"id":"resp_1","status":"completed","conversation_id":"conv_1"}}

'''
