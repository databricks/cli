Local = true
Cloud = false

# No bundle deploy, so no engine matrix.
[EnvMatrix]
DATABRICKS_BUNDLE_ENGINE = []

# Stub the SDK's reachability HEAD probe for determinism.
[[Server]]
Pattern = "HEAD /"
Response.Body = ''

# version makes one authenticated call; return a fixed user.
[[Server]]
Pattern = "GET /api/2.0/preview/scim/v2/Me"
Response.Body = '''
{"userName": "user@example.com"}
'''
